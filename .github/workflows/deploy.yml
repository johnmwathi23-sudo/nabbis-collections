name: Deploy - Nabbis Collections

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Install rsync
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync sshpass

      - name: Deploy via rsync
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASS: ${{ secrets.DEPLOY_PASS }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          sshpass -p "$DEPLOY_PASS" rsync -avz --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'docker' \
            --exclude 'node_modules' \
            --exclude '.gitignore' \
            --exclude 'README.md' \
            wordpress/wp-content/themes/nabbis-theme/ \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/wp-content/themes/nabbis-theme/"

          sshpass -p "$DEPLOY_PASS" rsync -avz --delete \
            --exclude '.git' \
            wordpress/wp-content/plugins/nabbis-mpesa/ \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/wp-content/plugins/nabbis-mpesa/"

          sshpass -p "$DEPLOY_PASS" rsync -avz --delete \
            wordpress/wp-content/plugins/nabbis-delivery/ \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/wp-content/plugins/nabbis-delivery/"

          sshpass -p "$DEPLOY_PASS" rsync -avz --delete \
            wordpress/wp-content/plugins/nabbis-core/ \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/wp-content/plugins/nabbis-core/"

          sshpass -p "$DEPLOY_PASS" rsync -avz --delete \
            wordpress/wp-content/plugins/nabbis-admin/ \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/wp-content/plugins/nabbis-admin/"

          sshpass -p "$DEPLOY_PASS" rsync -avz --delete \
            wordpress/wp-content/mu-plugins/ \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/wp-content/mu-plugins/"

      - name: Run post-deploy commands
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASS: ${{ secrets.DEPLOY_PASS }}
        run: |
          sshpass -p "$DEPLOY_PASS" ssh "$DEPLOY_USER@$DEPLOY_HOST" "
            cd $DEPLOY_PATH
            wp cache flush --allow-root
            wp rewrite flush --allow-root
            wp theme activate nabbis-theme --allow-root
          "
