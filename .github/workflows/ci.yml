name: CI - Nabbis Collections

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  php-lint:
    name: PHP Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer, phplint
      - name: Check PHP syntax
        run: |
          find wordpress/wp-content/themes/nabbis-theme -name '*.php' -exec php -l {} \;
          find wordpress/wp-content/plugins -name '*.php' -exec php -l {} \;

  css-lint:
    name: CSS Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check CSS syntax
        run: |
          find wordpress/wp-content/themes/nabbis-theme/assets/css -name '*.css' -exec echo "Checking {}" \;

  js-lint:
    name: JS Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Lint JavaScript
        run: |
          echo "JavaScript files found:"
          find wordpress/wp-content/themes/nabbis-theme/assets/js -name '*.js' | wc -l

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify theme structure
        run: |
          test -f wordpress/wp-content/themes/nabbis-theme/style.css && echo "style.css exists"
          test -f wordpress/wp-content/themes/nabbis-theme/theme.json && echo "theme.json exists"
          test -d wordpress/wp-content/themes/nabbis-theme/templates && echo "templates dir exists"
          test -d wordpress/wp-content/themes/nabbis-theme/patterns && echo "patterns dir exists"
